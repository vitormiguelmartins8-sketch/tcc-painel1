<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="transition-overlay" id="overlay"></div>

    <div class="container">

        <div class="pagina">
            <video autoplay muted loop>
                <source src="seu-video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="tela">
            <div id="tela2" class="caixa-branca-login">

                <div class="conteudo-login ativo" id="conteudoAluno">
                    <h1>Login Alunos</h1>
                    <p>Bem-vindo, aluno!</p>

                    <form id="formAluno">
                        <div class="input-grupo">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="Digite seu email">
                        </div>

                        <div class="input-grupo">
                            <label for="senhaAluno">Senha</label>
                            <input type="password" id="senhaAluno" name="senhaAluno" required placeholder="••••••••">
                        </div>

                        <p class="msg-erro" id="msgAluno"></p>

                        <button type="submit" class="btn-principal">Logar como Aluno</button>
                    </form>

                    <button type="button" class="btn-link-alternar" id="irParaProfessor">Sou Professor ➔</button>
                    <br>
                    <a href="cadastro.html" class="btn-link-alternar">Criar conta</a>
                </div>

                <div class="conteudo-login" id="conteudoProfessor">
                    <h1>Login Professores</h1>
                    <p>Bem-vindo , professor!</p>

                    <form id="formProfessor">
                        <div class="input-grupo">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" name="cpf" required placeholder="Digite seu CPF">
                        </div>

                        <div class="input-grupo">
                            <label for="senhaProf">Senha</label>
                            <input type="password" id="senhaProf" name="senhaProf" required placeholder="••••••••">
                        </div>

                        <p class="msg-erro" id="msgProf"></p>

                        <button type="submit" class="btn-principal">Logar como Professor</button>
                    </form>

                    <button type="button" class="btn-link-alternar" id="irParaAluno">◀ Sou Aluno</button>
                    <br>
                    <a href="cadastro.html" class="btn-link-alternar">Criar conta</a>
                </div>

            </div>
        </div>
    </div>

    <script src="animaçao.js" defer></script>
</body>

</html>
